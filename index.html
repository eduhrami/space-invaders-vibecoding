<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Space Invaders</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    color: #0f0;
    overflow: hidden;
  }
  #wrap {
    text-align: center;
  }
  canvas {
    background: #000;
    border: 2px solid #0f0;
    box-shadow: 0 0 20px #0f0;
    image-rendering: pixelated;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    width: 600px;
    margin: 0 auto 8px auto;
    font-size: 20px;
    letter-spacing: 2px;
  }
  #overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    z-index: 10;
  }
  #overlay h1 {
    font-size: 40px;
    text-shadow: 0 0 10px #0f0;
  }
  #overlay p {
    font-size: 16px;
  }
  button {
    background: #000;
    color: #0f0;
    border: 2px solid #0f0;
    padding: 10px 20px;
    font-family: inherit;
    font-size: 16px;
    cursor: pointer;
  }
  button:hover {
    background: #0f0;
    color: #000;
  }
  #themeButtons {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }
  #btnMonsters {
    color: #b06bff;
    border-color: #b06bff;
  }
  #btnMonsters:hover {
    background: #b06bff;
    color: #000;
  }
  #hint {
    margin-top: 10px;
    font-size: 12px;
    color: #0a0;
  }
  #powerupBar {
    display: none;
    margin-top: 6px;
    font-size: 14px;
    color: #ff8800;
    text-shadow: 0 0 8px #ff6600;
    letter-spacing: 1px;
  }
  #statusBar {
    display: none;
    margin-top: 4px;
    font-size: 14px;
    color: #55ffcc;
    text-shadow: 0 0 8px #33ffbb;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div>PUNTOS: <span id="score">0</span></div>
    <div>VIDAS: <span id="lives">3</span></div>
    <div>NIVEL: <span id="level">1</span></div>
  </div>
  <canvas id="game" width="600" height="600"></canvas>
  <div id="powerupBar"></div>
  <div id="statusBar"></div>
  <div id="hint">← → mover · ESPACIO disparar · P pausa</div>
</div>

<div id="overlay">
  <h1 id="overlayTitle">SPACE INVADERS</h1>
  <p id="overlaySub">Elige tu tipo de enemigo</p>
  <div id="themeButtons">
    <button id="btnInsects">🐜 INSECTOS</button>
    <button id="btnMonsters">👹 MONSTRUOS</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const themeButtons = document.getElementById('themeButtons');
const btnInsects = document.getElementById('btnInsects');
const btnMonsters = document.getElementById('btnMonsters');

let state = 'idle'; // idle, playing, paused, gameover, win
let score = 0;
let lives = 3;
let level = 1;
let enemyTheme = 'insects'; // 'insects' | 'monsters'

// --- Player ---
const player = {
  w: 40, h: 20,
  x: W/2 - 20, y: H - 50,
  speed: 6,
  cooldown: 0,
  shieldHits: 0, // impactos que el escudo absorbe antes de perder una vida
  retryTokens: 0, // oportunidades de reintentar el nivel si pierdes
  extraLives: 0 // reapareces donde estabas, sin reiniciar la oleada/boss
};

let keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'KeyP' && state === 'playing') { state = 'paused'; showOverlay('PAUSA', 'Presiona P para continuar', false); }
  else if (e.code === 'KeyP' && state === 'paused') { state = 'playing'; hideOverlay(); }
});
document.addEventListener('keyup', e => keys[e.code] = false);

// --- Bullets ---
let playerBullets = [];
let alienBullets = [];
const NORMAL_BULLET_SPEED = 9;
const NORMAL_BULLET_DMG = 2;

// --- Aliens ---
let aliens = [];
let alienDir = 1;
let alienSpeed = 1;
let alienDropTimer = 0;
const alienRows = 5;
const alienCols = 10;
const alienW = 30, alienH = 20, alienPad = 12;
const alienColors = ['#ff5555', '#ffaa00', '#ffff55', '#55ff55', '#55aaff'];
const ALIEN_HP = NORMAL_BULLET_DMG; // un disparo normal siempre mata en un golpe
let rowCleared = []; // marca por fila si ya soltó su item de bonus

// --- Sistema de items sorpresa (power-ups) ---
// Cada entrada define cómo se ve el item al caer y qué efecto aplica al
// recogerlo. Para agregar un item nuevo basta con sumar una entrada aquí
// y (si necesita comportamiento propio, como fuego/hielo) leer
// `activeEffects.<id>` donde corresponda.
const ITEM_TYPES = {
  fireBullet: {
    label: '🔥 Balas de fuego',
    color: '#ff6600',
    icon: '🔥',
    duration: 480, // ~8s a 60fps
    // cada item de fuego adicional que recoges suma un disparo simultáneo más
    // (2 items = doble disparo, 3 = triple, ...); tope de seguridad en 8.
    onPickup(effects, def) {
      if (!effects.fireBullet) {
        effects.fireBullet = { timeLeft: def.duration, label: def.label, stacks: 1 };
      } else {
        effects.fireBullet.stacks = Math.min(effects.fireBullet.stacks + 1, FIRE_MAX_STACKS);
        effects.fireBullet.timeLeft = def.duration;
      }
    }
  },
  iceBullet: {
    label: '❄️ Balas de hielo',
    color: '#33aaff',
    icon: '❄️',
    duration: 480,
    onPickup(effects, def) {
      effects.iceBullet = { timeLeft: def.duration, label: def.label };
    }
  },
  shield: {
    label: '🛡️ Escudo',
    color: '#55ffcc',
    icon: '🛡️',
    // no es un efecto por tiempo: suma golpes de escudo directamente al jugador
    onPickup() {
      player.shieldHits += 2;
    }
  },
  retryToken: {
    label: '🔁 Reintento extra',
    color: '#ffd700',
    icon: '🔁',
    onPickup() {
      player.retryTokens += 1;
    }
  },
  extraLife: {
    label: '❤️ Vida extra',
    color: '#ff4477',
    icon: '❤️',
    weight: 0.4, // más raro que el resto de los items
    onPickup() {
      player.extraLives += 1;
    }
  }
};

// Efecto de las balas de fuego: más lentas y perforan, incendiando hasta
// 2 enemigos por disparo; cada uno se va quemando poco a poco (parpadeo rojo)
// hasta morir, en vez de caer al instante.
const FIRE_BULLET_SPEED = 5;
const FIRE_BULLET_DMG = 0;
const FIRE_BURN_DMG_PER_TICK = 1;
const FIRE_BURN_TICKS = 3;
const FIRE_TICK_INTERVAL = 18; // frames entre cada "mordida" de fuego
const FIRE_PIERCE_COUNT = 2; // enemigos que puede incendiar un mismo disparo
const FIRE_MAX_STACKS = 8; // tope de disparos simultáneos por acumular items de fuego

// Efecto de las balas de hielo: no matan al impactar, congelan al enemigo
// golpeado y a los de al lado (mismo fila). Los congelados no disparan y se
// ven azules; un segundo impacto sobre un enemigo congelado lo elimina.
const ICE_BULLET_SPEED = NORMAL_BULLET_SPEED;

let activeEffects = {}; // efectos activos del jugador, keyed por id de item
let fallingItems = []; // items cayendo, esperando a ser recogidos

// Selección ponderada: cada item pesa 1 salvo que declare `weight` (ej. la
// vida extra, que debe caer con menos frecuencia que el resto).
function pickRandomItemType() {
  const entries = Object.entries(ITEM_TYPES);
  const totalWeight = entries.reduce((sum, [, def]) => sum + (def.weight || 1), 0);
  let roll = Math.random() * totalWeight;
  for (const [id, def] of entries) {
    roll -= (def.weight || 1);
    if (roll <= 0) return id;
  }
  return entries[entries.length - 1][0];
}

function spawnItemAt(cx, cy) {
  fallingItems.push({
    x: cx - 12, y: cy - 12, w: 24, h: 24,
    vy: 2.2,
    spin: 0,
    typeId: pickRandomItemType()
  });
}

function spawnItemDrop(rowAliens) {
  const avgX = rowAliens.reduce((sum, a) => sum + a.x + a.w / 2, 0) / rowAliens.length;
  const y = rowAliens[0].y;
  spawnItemAt(avgX, y + 12);
}

// El bonus cae apenas se elimina la mitad de una fila (no hace falta limpiarla entera)
function checkRowClear(row) {
  if (rowCleared[row]) return;
  const rowAliens = aliens.filter(a => a.row === row);
  if (rowAliens.length === 0) return;
  const deadCount = rowAliens.filter(a => !a.alive).length;
  if (deadCount >= Math.ceil(rowAliens.length / 2)) {
    rowCleared[row] = true;
    spawnItemDrop(rowAliens);
  }
}

function killAlien(a) {
  if (!a.alive) return;
  a.alive = false;
  a.burning = false;
  a.frozen = false;
  score += (alienRows - a.row) * 10;
  updateHud();
  checkRowClear(a.row);
}

// Congela al enemigo golpeado y a sus vecinos inmediatos en la misma fila
function freezeAlien(a) {
  a.frozen = true;
  aliens.forEach(n => {
    if (n.alive && n.row === a.row && (n.col === a.col - 1 || n.col === a.col + 1)) {
      n.frozen = true;
    }
  });
}

function buildAliens() {
  aliens = [];
  const startX = (W - (alienCols * (alienW + alienPad) - alienPad)) / 2;
  for (let r = 0; r < alienRows; r++) {
    for (let c = 0; c < alienCols; c++) {
      aliens.push({
        x: startX + c * (alienW + alienPad),
        y: 60 + r * (alienH + alienPad),
        w: alienW, h: alienH,
        alive: true,
        row: r,
        col: c,
        anim: 0,
        hp: ALIEN_HP,
        burning: false,
        burnTimer: 0,
        burnTicksLeft: 0,
        frozen: false
      });
    }
  }
  alienDir = 1;
  alienSpeed = 1 + (level - 1) * 0.15; // curva suave pensada para una campaña de 20 niveles
  rowCleared = new Array(alienRows).fill(false);
  fallingItems = [];
  boss = null;
}

// --- Boss ---
// Aparece cuando se limpia toda la oleada normal de una fase (20 niveles en
// total). Tres categorías, cada una más grande y resistente que la anterior:
//  - pequeño: niveles normales, tamaño 3x3, reutiliza las 4 formas de siempre.
//  - mayor: cada 4 niveles (4, 8, 12, 16), tamaño 4x4, forma única por aparición.
//  - final: nivel 20, la rata furiosa, tamaño 5x5, el más resistente de todos.
// Cada 4 niveles superados (un "ciclo") todos los bosses pegan más fuerte,
// disparan más seguido y se mueven más rápido.
const TOTAL_LEVELS = 20;
const SMALL_BOSS_BASE_HP = 18;
const MAJOR_BOSS_BASE_HP = 30;
const FINAL_BOSS_HP = 45;
const BOSS_SLOW_DURATION = 120; // 2s a 60fps
const BOSS_SCORE_REWARD = 500;
const BOSS_MAJOR_SCORE_REWARD = 1200;
const BOSS_ITEM_DROP_INTERVAL = 5; // cada cuántos disparos que le pegan suelta un item
let boss = null;

// 0 en los niveles 1-4, 1 en 5-8, 2 en 9-12, 3 en 13-16, 4 en 17-20
function bossCycle(lvl) {
  return Math.floor((lvl - 1) / 4);
}

// Índice consecutivo entre solo los niveles de boss pequeño (los niveles
// múltiplo de 4 son bosses mayores y no cuentan), para que las 4 formas de
// boss pequeño roten todas por igual en vez de saltarse una por el módulo.
function smallBossIndex(lvl) {
  return (lvl - 1) - Math.floor((lvl - 1) / 4);
}

function spawnBoss() {
  const isFinal = level >= TOTAL_LEVELS;
  const isMajor = !isFinal && level % 4 === 0;
  const isMonster = enemyTheme === 'monsters';
  const cycle = bossCycle(level);

  let bw, bh, hp, drawer, baseColor;
  if (isFinal) {
    bw = alienW * 5 + alienPad * 4;
    bh = alienH * 5 + alienPad * 4;
    hp = FINAL_BOSS_HP;
    drawer = drawRat;
    baseColor = '#8a6a4a';
  } else if (isMajor) {
    bw = alienW * 4 + alienPad * 3;
    bh = alienH * 4 + alienPad * 3;
    hp = MAJOR_BOSS_BASE_HP + cycle * 4;
    const majors = isMonster ? monsterMajorBossDrawers : insectMajorBossDrawers;
    drawer = majors[(level / 4 - 1) % majors.length];
    baseColor = '#7a1010';
  } else {
    bw = alienW * 3 + alienPad * 2;
    bh = alienH * 3 + alienPad * 2;
    hp = SMALL_BOSS_BASE_HP + cycle * 3;
    const smalls = isMonster ? monsterBossDrawers : insectBossDrawers;
    drawer = smalls[smallBossIndex(level) % smalls.length];
    baseColor = '#b30000';
  }

  boss = {
    x: W/2 - bw/2, y: 50,
    w: bw, h: bh,
    hp, maxHp: hp,
    alive: true,
    dir: 1,
    speed: (1.5 + level * 0.3) * (1 + cycle * 0.15),
    fireChance: 0.01 + cycle * 0.008, // dispara más seguido en cada ciclo
    bulletDmg: cycle >= 3 ? 2 : 1, // desde el ciclo 3 (nivel 13+) sus disparos quitan 2 vidas
    slowTimer: 0,
    iceArmed: false, // true tras el primer impacto de hielo: el siguiente resta vida
    hitsTaken: 0, // dispara un item de bonus cada BOSS_ITEM_DROP_INTERVAL impactos
    anim: 0,
    drawer,
    baseColor,
    isMajor,
    isFinal
  };
}

function killBoss() {
  if (!boss || !boss.alive) return;
  boss.alive = false;
  score += (boss.isMajor || boss.isFinal) ? BOSS_MAJOR_SCORE_REWARD : BOSS_SCORE_REWARD;
  updateHud();
}

// --- Barriers (shields) ---
let barriers = [];
function buildBarriers() {
  barriers = [];
  const count = 4;
  const bw = 60, bh = 40;
  const spacing = W / count;
  for (let i = 0; i < count; i++) {
    const bx = spacing * i + spacing/2 - bw/2;
    const by = H - 140;
    // build as grid of blocks
    const block = 6;
    const blocks = [];
    for (let row = 0; row < bh/block; row++) {
      for (let col = 0; col < bw/block; col++) {
        // shape: skip bottom middle to look like a bunker
        if (row > (bh/block - 3) && col > 2 && col < (bw/block - 3)) continue;
        blocks.push({ x: bx + col*block, y: by + row*block, w: block, h: block, alive: true });
      }
    }
    barriers.push(blocks);
  }
}

// --- Stars background ---
let stars = [];
function buildStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5, s: Math.random()*0.5 + 0.1 });
  }
}
buildStars();

function resetGame() {
  score = 0;
  lives = 3;
  level = 1;
  player.x = W/2 - player.w/2;
  player.shieldHits = 0;
  player.retryTokens = 0;
  player.extraLives = 0;
  playerBullets = [];
  alienBullets = [];
  activeEffects = {};
  buildAliens();
  buildBarriers();
  updateHud();
}

function nextLevel() {
  level++;
  playerBullets = [];
  alienBullets = [];
  buildAliens();
  buildBarriers();
  updateHud();
}

function updateHud() {
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  levelEl.textContent = level;
}

function showOverlay(title, sub, showButtons = true) {
  overlayTitle.textContent = title;
  overlaySub.textContent = sub;
  themeButtons.style.display = showButtons ? 'flex' : 'none';
  overlay.style.display = 'flex';
}
function hideOverlay() {
  overlay.style.display = 'none';
}

function startGame(theme) {
  enemyTheme = theme;
  resetGame();
  state = 'playing';
  hideOverlay();
}

btnInsects.addEventListener('click', () => startGame('insects'));
btnMonsters.addEventListener('click', () => startGame('monsters'));

showOverlay('SPACE INVADERS', 'Elige tu tipo de enemigo');

// --- Game loop ---
function update() {
  if (state !== 'playing') return;

  // player movement
  if (keys['ArrowLeft']) player.x -= player.speed;
  if (keys['ArrowRight']) player.x += player.speed;
  player.x = Math.max(0, Math.min(W - player.w, player.x));

  // efectos activos del jugador (power-ups): cuenta regresiva y expiración
  Object.keys(activeEffects).forEach(id => {
    activeEffects[id].timeLeft--;
    if (activeEffects[id].timeLeft <= 0) delete activeEffects[id];
  });

  // shooting
  if (player.cooldown > 0) player.cooldown--;
  if (keys['Space'] && player.cooldown <= 0) {
    const fireActive = !!activeEffects.fireBullet;
    const iceActive = !fireActive && !!activeEffects.iceBullet;
    // cada item de fuego acumulado dispara una bala de fuego más en abanico
    const shots = fireActive ? activeEffects.fireBullet.stacks : 1;
    for (let i = 0; i < shots; i++) {
      const spread = shots > 1 ? (i - (shots - 1) / 2) * 9 : 0;
      playerBullets.push({
        x: player.x + player.w/2 - 2 + spread, y: player.y, w: 4, h: 12,
        vy: fireActive ? FIRE_BULLET_SPEED : (iceActive ? ICE_BULLET_SPEED : NORMAL_BULLET_SPEED),
        dmg: fireActive ? FIRE_BULLET_DMG : NORMAL_BULLET_DMG,
        fire: fireActive,
        ice: iceActive,
        pierceLeft: fireActive ? FIRE_PIERCE_COUNT : 1
      });
    }
    player.cooldown = 15;
  }

  // move bullets
  playerBullets.forEach(b => b.y -= b.vy);
  playerBullets = playerBullets.filter(b => b.y + b.h > 0);

  alienBullets.forEach(b => b.y += 5 + level*0.3);
  alienBullets = alienBullets.filter(b => b.y < H);

  // items sorpresa cayendo
  fallingItems.forEach(item => {
    item.y += item.vy;
    item.spin += 0.08;
    if (rectHit(item, player)) {
      item.caught = true;
      const def = ITEM_TYPES[item.typeId];
      if (def && def.onPickup) def.onPickup(activeEffects, def);
    }
  });
  fallingItems = fallingItems.filter(item => !item.caught && item.y < H);

  // quemadura: los insectos/monstruos encendidos pierden vida poco a poco
  aliens.forEach(a => {
    if (!a.alive || !a.burning) return;
    a.burnTimer++;
    if (a.burnTimer >= FIRE_TICK_INTERVAL) {
      a.burnTimer = 0;
      a.hp -= FIRE_BURN_DMG_PER_TICK;
      a.burnTicksLeft--;
      if (a.hp <= 0) {
        killAlien(a);
      } else if (a.burnTicksLeft <= 0) {
        a.burning = false;
      }
    }
  });

  // move aliens
  let aliveAliens = aliens.filter(a => a.alive);
  let edgeHit = false;
  aliveAliens.forEach(a => {
    if (a.x + a.w >= W && alienDir > 0) edgeHit = true;
    if (a.x <= 0 && alienDir < 0) edgeHit = true;
  });

  const speedFactor = 1 + (1 - aliveAliens.length / (alienRows*alienCols)) * 2;
  aliens.forEach(a => {
    if (!a.alive) return;
    a.x += alienDir * alienSpeed * speedFactor;
    a.anim += 0.05;
  });

  if (edgeHit) {
    alienDir *= -1;
    aliens.forEach(a => { if (a.alive) a.y += 16; });
  }

  // move boss (rebota horizontalmente y baja en cada rebote, igual que los
  // enemigos regulares; más lento mientras dura el congelamiento)
  if (boss && boss.alive) {
    if (boss.slowTimer > 0) boss.slowTimer--;
    const speedMult = boss.slowTimer > 0 ? 0.4 : 1;
    boss.x += boss.dir * boss.speed * speedMult;
    if (boss.x <= 0 || boss.x + boss.w >= W) {
      boss.dir *= -1;
      boss.y += 16;
    }
    boss.x = Math.max(0, Math.min(W - boss.w, boss.x));
    boss.anim += 0.05;
  }

  // aliens (y el boss) llegan al jugador -> game over
  aliveAliens.forEach(a => {
    if (a.y + a.h >= player.y) {
      endGame(false);
    }
  });
  if (boss && boss.alive && boss.y + boss.h >= player.y) {
    endGame(false);
  }

  // alien shooting (los congelados no pueden disparar)
  alienDropTimer++;
  const fireChance = 0.015 + level * 0.003;
  const shooters = aliveAliens.filter(a => !a.frozen);
  if (shooters.length > 0 && Math.random() < fireChance) {
    const shooter = shooters[Math.floor(Math.random()*shooters.length)];
    alienBullets.push({ x: shooter.x + shooter.w/2 - 2, y: shooter.y + shooter.h, w: 4, h: 12, dmgLives: 1 });
  }

  // el boss dispara aparte, con su propio ritmo (más agresivo en cada ciclo)
  if (boss && boss.alive && Math.random() < boss.fireChance) {
    alienBullets.push({
      x: boss.x + boss.w/2 - 2, y: boss.y + boss.h, w: 4, h: 12,
      dmgLives: boss.bulletDmg
    });
  }

  // collisions: player bullets vs aliens
  playerBullets.forEach(b => {
    if (b.hit) return;
    if (!b.hitAliens) b.hitAliens = new Set();
    aliens.forEach(a => {
      if (!a.alive || b.hit || b.hitAliens.has(a)) return;
      if (rectHit(b, a)) {
        b.hitAliens.add(a);
        if (a.frozen) {
          // un enemigo ya congelado se rompe y muere con cualquier impacto
          killAlien(a);
        } else if (b.ice) {
          freezeAlien(a);
        } else {
          if (b.fire) {
            a.burning = true;
            a.burnTimer = 0;
            a.burnTicksLeft = FIRE_BURN_TICKS;
          }
          a.hp -= b.dmg;
          if (a.hp <= 0) killAlien(a);
        }
        b.pierceLeft--;
        if (b.pierceLeft <= 0) b.hit = true;
      }
    });
  });
  playerBullets = playerBullets.filter(b => !b.hit);

  // collisions: player bullets vs boss
  if (boss && boss.alive) {
    playerBullets.forEach(b => {
      if (b.hit) return;
      if (!b.hitAliens) b.hitAliens = new Set();
      if (b.hitAliens.has(boss) || !rectHit(b, boss)) return;
      b.hitAliens.add(boss);
      if (b.ice) {
        boss.slowTimer = BOSS_SLOW_DURATION;
        if (boss.iceArmed) {
          boss.hp -= 2;
          boss.iceArmed = false;
        } else {
          boss.iceArmed = true;
        }
      } else {
        boss.hp -= 1; // cada disparo normal o de fuego cuenta como uno de los 18
      }
      boss.hitsTaken++;
      if (boss.hitsTaken >= BOSS_ITEM_DROP_INTERVAL) {
        boss.hitsTaken = 0;
        spawnItemAt(boss.x + boss.w/2, boss.y + boss.h + 16);
      }
      if (boss.hp <= 0) killBoss();
      b.pierceLeft--;
      if (b.pierceLeft <= 0) b.hit = true;
    });
    playerBullets = playerBullets.filter(b => !b.hit);
  }

  // collisions: player bullets vs barriers
  playerBullets.forEach(b => {
    barriers.forEach(blocks => {
      blocks.forEach(block => {
        if (!block.alive) return;
        if (rectHit(b, block)) {
          block.alive = false;
          b.hit = true;
        }
      });
    });
  });
  playerBullets = playerBullets.filter(b => !b.hit);

  // collisions: alien bullets vs barriers
  alienBullets.forEach(b => {
    barriers.forEach(blocks => {
      blocks.forEach(block => {
        if (!block.alive) return;
        if (rectHit(b, block)) {
          block.alive = false;
          b.hit = true;
        }
      });
    });
  });
  alienBullets = alienBullets.filter(b => !b.hit);

  // collisions: alien bullets vs player
  alienBullets.forEach(b => {
    if (rectHit(b, player)) {
      b.hit = true;
      if (player.shieldHits > 0) {
        player.shieldHits--;
      } else {
        lives -= (b.dmgLives || 1);
        updateHud();
        if (lives <= 0) {
          endGame(false);
        }
      }
    }
  });
  alienBullets = alienBullets.filter(b => !b.hit);

  // win condition: primero hay que limpiar la oleada, luego derrotar al boss
  if (aliveAliens.length === 0 && state === 'playing') {
    if (!boss) {
      spawnBoss();
    } else if (!boss.alive) {
      if (level >= TOTAL_LEVELS) {
        endGame(true);
      } else {
        state = 'levelup';
        showOverlay('¡NIVEL ' + level + ' SUPERADO!', 'Preparando nivel ' + (level+1) + '...', false);
        setTimeout(() => {
          nextLevel();
          state = 'playing';
          hideOverlay();
        }, 1800);
      }
    }
  }
}

function rectHit(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function endGame(won) {
  if (!won && player.extraLives > 0) {
    player.extraLives--;
    respawnPlayer();
    return;
  }
  if (!won && player.retryTokens > 0) {
    player.retryTokens--;
    retryLevel();
    return;
  }
  state = won ? 'win' : 'gameover';
  if (won) {
    showOverlay('¡GANASTE!', 'Puntaje final: ' + score + ' · Elige tu enemigo para jugar de nuevo');
  } else {
    showOverlay('GAME OVER', 'Puntaje final: ' + score + ' · Elige tu enemigo para jugar de nuevo');
  }
}

// Consume una vida extra: NO reinicia la oleada ni el boss, solo reaparece
// donde estabas (misma posición) con una vida fresca.
function respawnPlayer() {
  state = 'levelup';
  lives = 1;
  playerBullets = [];
  alienBullets = [];
  updateHud();
  showOverlay('¡VIDA EXTRA!', 'Reapareces donde estabas · Te quedan ' + player.extraLives + ' vidas extra', false);
  setTimeout(() => {
    state = 'playing';
    hideOverlay();
  }, 1200);
}

// Consume un item de reintento: reconstruye el nivel actual en vez de terminar la partida
function retryLevel() {
  state = 'levelup';
  lives = 3;
  playerBullets = [];
  alienBullets = [];
  player.shieldHits = 0;
  player.x = W/2 - player.w/2;
  buildAliens();
  buildBarriers();
  updateHud();
  showOverlay('¡SEGUNDA OPORTUNIDAD!', 'Reintentando el nivel ' + level + ' · Te quedan ' + player.retryTokens + ' reintentos', false);
  setTimeout(() => {
    state = 'playing';
    hideOverlay();
  }, 1600);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // stars
  ctx.fillStyle = '#fff';
  stars.forEach(s => {
    s.y += s.s;
    if (s.y > H) s.y = 0;
    ctx.globalAlpha = 0.6;
    ctx.fillRect(s.x, s.y, s.r, s.r);
  });
  ctx.globalAlpha = 1;

  // player
  drawPlayer();

  // player bullets
  playerBullets.forEach(b => {
    ctx.fillStyle = b.fire ? '#ff6600' : (b.ice ? '#33aaff' : '#0ff');
    ctx.fillRect(b.x, b.y, b.w, b.h);
  });

  // alien bullets
  ctx.fillStyle = '#f0f';
  alienBullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

  // aliens
  aliens.forEach(a => {
    if (!a.alive) return;
    drawAlien(a);
  });

  // boss
  drawBoss();

  // items sorpresa cayendo
  fallingItems.forEach(drawFallingItem);

  // barriers
  barriers.forEach(blocks => {
    ctx.fillStyle = '#0f0';
    blocks.forEach(b => {
      if (b.alive) ctx.fillRect(b.x, b.y, b.w, b.h);
    });
  });

  updatePowerupHud();
  updateStatusBar();
}

function drawFallingItem(item) {
  const def = ITEM_TYPES[item.typeId];
  const cx = item.x + item.w/2, cy = item.y + item.h/2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(Math.sin(item.spin) * 0.2);
  ctx.shadowColor = def.color;
  ctx.shadowBlur = 14;
  ctx.fillStyle = def.color;
  ctx.beginPath();
  ctx.arc(0, 0, item.w/2, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.font = (item.w*0.7) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(def.icon, 0, 1);
  ctx.restore();
}

function updatePowerupHud() {
  const el = document.getElementById('powerupBar');
  const active = Object.keys(activeEffects);
  if (active.length === 0) {
    el.style.display = 'none';
    return;
  }
  el.textContent = active
    .map(id => {
      const eff = activeEffects[id];
      const stackTag = eff.stacks > 1 ? ' x' + eff.stacks : '';
      return eff.label + stackTag + ': ' + Math.ceil(eff.timeLeft / 60) + 's';
    })
    .join('   ·   ');
  el.style.display = 'block';
}

function updateStatusBar() {
  const el = document.getElementById('statusBar');
  const parts = [];
  if (player.shieldHits > 0) parts.push('🛡️ Escudo x' + player.shieldHits);
  if (player.retryTokens > 0) parts.push('🔁 Reintentos x' + player.retryTokens);
  if (player.extraLives > 0) parts.push('❤️ Vidas extra x' + player.extraLives);
  if (parts.length === 0) {
    el.style.display = 'none';
    return;
  }
  el.textContent = parts.join('   ·   ');
  el.style.display = 'block';
}

function drawPlayer() {
  ctx.fillStyle = '#0f0';
  const x = player.x, y = player.y, w = player.w, h = player.h;
  ctx.fillRect(x, y + h*0.5, w, h*0.5);
  ctx.fillRect(x + w*0.4, y, w*0.2, h*0.5);
  ctx.fillRect(x + w*0.1, y + h*0.3, w*0.15, h*0.3);
  ctx.fillRect(x + w*0.75, y + h*0.3, w*0.15, h*0.3);

  if (player.shieldHits > 0) {
    ctx.save();
    ctx.globalAlpha = 0.75;
    ctx.strokeStyle = '#55ffcc';
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#55ffcc';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.ellipse(x + w/2, y + h*0.55, w*0.75, h*1.5, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#55ffcc';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(player.shieldHits, x + w/2, y - 6);
    ctx.restore();
  }
}

function drawLegs(w, h, pairs, spread, wobble) {
  ctx.beginPath();
  const legAngle = wobble ? 1 : -1;
  for (let i = 0; i < pairs; i++) {
    const t = pairs === 1 ? 0 : (i / (pairs - 1)) * 2 - 1; // -1..1
    const legY = t * h * spread;
    const kick = (i % 2 === 0 ? legAngle : -legAngle) * h * 0.1;
    ctx.moveTo(-w*0.14, legY);
    ctx.lineTo(-w*0.6, legY + kick);
    ctx.moveTo(w*0.14, legY);
    ctx.lineTo(w*0.6, legY + kick);
  }
  ctx.stroke();
}

function drawAntennae(w, h, wobble) {
  ctx.beginPath();
  ctx.moveTo(-w*0.1, -h*0.4);
  ctx.lineTo(-w*0.26, -h*0.58 + (wobble ? -2 : 2));
  ctx.moveTo(w*0.1, -h*0.4);
  ctx.lineTo(w*0.26, -h*0.58 + (wobble ? 2 : -2));
  ctx.stroke();
}

function drawEyes(w, h, dotR = 0.05) {
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(-w*0.08, -h*0.22, w*dotR, h*(dotR+0.01), 0, 0, Math.PI*2);
  ctx.ellipse(w*0.08, -h*0.22, w*dotR, h*(dotR+0.01), 0, 0, Math.PI*2);
  ctx.fill();
}

// Row 0: avispa - cintura estrecha, abdomen puntiagudo, alas
function drawWasp(w, h, wobble, color) {
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, w*0.05);
  drawLegs(w, h, 3, 0.22, wobble);
  drawAntennae(w, h, wobble);
  // alas
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.ellipse(-w*0.3, -h*0.05, w*0.22, h*(wobble ? 0.32 : 0.24), -0.3, 0, Math.PI*2);
  ctx.ellipse(w*0.3, -h*0.05, w*0.22, h*(wobble ? 0.32 : 0.24), 0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // abdomen puntiagudo
  ctx.beginPath();
  ctx.moveTo(0, h*0.44);
  ctx.quadraticCurveTo(w*0.3, h*0.1, 0, -h*0.02);
  ctx.quadraticCurveTo(-w*0.3, h*0.1, 0, h*0.44);
  ctx.fill();
  // cintura
  ctx.beginPath();
  ctx.ellipse(0, -h*0.05, w*0.06, h*0.08, 0, 0, Math.PI*2);
  ctx.fill();
  // cabeza/torax
  ctx.beginPath();
  ctx.ellipse(0, -h*0.26, w*0.2, h*0.2, 0, 0, Math.PI*2);
  ctx.fill();
  drawEyes(w, h);
}

// Row 1: escarabajo - cuerpo ancho ovalado con caparazon dividido
function drawBeetle(w, h, wobble, color) {
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, w*0.06);
  drawLegs(w, h, 3, 0.24, wobble);
  // caparazon
  ctx.beginPath();
  ctx.ellipse(0, h*0.05, w*0.42, h*0.4, 0, 0, Math.PI*2);
  ctx.fill();
  // linea central del caparazon
  ctx.strokeStyle = '#000';
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.moveTo(0, -h*0.3);
  ctx.lineTo(0, h*0.4);
  ctx.stroke();
  ctx.globalAlpha = 1;
  // cabeza pequena
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, -h*0.36, w*0.14, h*0.12, 0, 0, Math.PI*2);
  ctx.fill();
  // cuernos (mandibulas)
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, w*0.04);
  ctx.beginPath();
  ctx.moveTo(-w*0.08, -h*0.46);
  ctx.lineTo(-w*0.16, -h*0.6 + (wobble ? -1 : 1));
  ctx.moveTo(w*0.08, -h*0.46);
  ctx.lineTo(w*0.16, -h*0.6 + (wobble ? 1 : -1));
  ctx.stroke();
  drawEyes(w, h, 0.04);
}

// Row 2: hormiga - tres segmentos delgados, antenas largas
function drawAnt(w, h, wobble, color) {
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, w*0.045);
  drawLegs(w, h, 3, 0.2, wobble);
  drawAntennae(w, h, wobble);
  // abdomen (grande, atras)
  ctx.beginPath();
  ctx.ellipse(0, h*0.34, w*0.26, h*0.22, 0, 0, Math.PI*2);
  ctx.fill();
  // torax (medio, pequeno)
  ctx.beginPath();
  ctx.ellipse(0, h*0.02, w*0.14, h*0.14, 0, 0, Math.PI*2);
  ctx.fill();
  // cabeza (redonda)
  ctx.beginPath();
  ctx.ellipse(0, -h*0.28, w*0.19, h*0.19, 0, 0, Math.PI*2);
  ctx.fill();
  drawEyes(w, h, 0.045);
}

// Row 3: mosca - cuerpo redondo, ojos grandes, alas grandes
function drawFly(w, h, wobble, color) {
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, w*0.05);
  drawLegs(w, h, 2, 0.2, wobble);
  // alas grandes
  ctx.globalAlpha = 0.45;
  ctx.beginPath();
  ctx.ellipse(-w*0.32, -h*0.1, w*0.26, h*(wobble ? 0.36 : 0.26), -0.2, 0, Math.PI*2);
  ctx.ellipse(w*0.32, -h*0.1, w*0.26, h*(wobble ? 0.36 : 0.26), 0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // cuerpo redondo
  ctx.beginPath();
  ctx.ellipse(0, h*0.08, w*0.3, h*0.34, 0, 0, Math.PI*2);
  ctx.fill();
  // cabeza con ojos enormes
  ctx.beginPath();
  ctx.ellipse(0, -h*0.28, w*0.24, h*0.2, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#a00';
  ctx.beginPath();
  ctx.ellipse(-w*0.11, -h*0.28, w*0.11, h*0.13, 0, 0, Math.PI*2);
  ctx.ellipse(w*0.11, -h*0.28, w*0.11, h*0.13, 0, 0, Math.PI*2);
  ctx.fill();
}

// Row 4: arana - cuerpo redondo compacto, 4 pares de patas, sin antenas
function drawSpider(w, h, wobble, color) {
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, w*0.05);
  drawLegs(w, h, 4, 0.32, wobble);
  // cuerpo compacto
  ctx.beginPath();
  ctx.ellipse(0, h*0.06, w*0.28, h*0.3, 0, 0, Math.PI*2);
  ctx.fill();
  // cabeza fusionada
  ctx.beginPath();
  ctx.ellipse(0, -h*0.22, w*0.18, h*0.18, 0, 0, Math.PI*2);
  ctx.fill();
  // varios ojos
  ctx.fillStyle = '#f00';
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.ellipse(i*w*0.09, -h*0.26, w*0.035, h*0.035, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

const insectDrawers = [drawWasp, drawBeetle, drawAnt, drawFly, drawSpider];

// 10 bosses pequeños extra, para que los 15 niveles de boss pequeño
// (todos menos los múltiplos de 4) tengan cada uno una forma distinta.
function drawCockroach(w, h, wobble, color) {
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, w*0.04);
  drawLegs(w, h, 3, 0.24, wobble);
  drawAntennae(w, h, wobble);
  ctx.beginPath();
  ctx.ellipse(0, h*0.05, w*0.4, h*0.32, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = Math.max(1, w*0.015);
  ctx.beginPath();
  for (let i = -1; i <= 1; i++) {
    ctx.moveTo(-w*0.35, h*(0.05 + i*0.12));
    ctx.lineTo(w*0.35, h*(0.05 + i*0.12));
  }
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, -h*0.32, w*0.16, h*0.14, 0, 0, Math.PI*2);
  ctx.fill();
  drawEyes(w, h, 0.035);
}

function drawCentipede(w, h, wobble, color) {
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, w*0.03);
  const legAngle = wobble ? 1 : -1;
  ctx.beginPath();
  for (let i = -2; i <= 2; i++) {
    const legY = i*h*0.16;
    ctx.moveTo(-w*0.1, legY);
    ctx.lineTo(-w*0.4, legY + legAngle*h*0.05);
    ctx.moveTo(w*0.1, legY);
    ctx.lineTo(w*0.4, legY - legAngle*h*0.05);
  }
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(0, 0, w*0.14, h*0.48, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = Math.max(1, w*0.015);
  ctx.beginPath();
  for (let i = -2; i <= 2; i++) {
    ctx.moveTo(-w*0.14, i*h*0.16);
    ctx.lineTo(w*0.14, i*h*0.16);
  }
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, -h*0.44, w*0.15, h*0.12, 0, 0, Math.PI*2);
  ctx.fill();
  drawEyes(w, h, 0.03);
}

function drawScorpion(w, h, wobble, color) {
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, w*0.045);
  drawLegs(w, h, 3, 0.2, wobble);
  const curl = wobble ? -0.1 : 0.1;
  ctx.beginPath();
  ctx.moveTo(0, h*0.25);
  ctx.quadraticCurveTo(w*0.3, h*0.15, w*0.32, -h*0.15 + curl*h);
  ctx.quadraticCurveTo(w*0.34, -h*0.35, w*0.22, -h*0.4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(w*0.22, -h*0.4);
  ctx.lineTo(w*0.3, -h*0.48);
  ctx.lineTo(w*0.26, -h*0.32);
  ctx.closePath();
  ctx.fill();
  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.ellipse(side*w*0.38, -h*0.05, w*0.13, h*0.16, 0, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.beginPath();
  ctx.ellipse(0, h*0.1, w*0.28, h*0.3, 0, 0, Math.PI*2);
  ctx.fill();
  drawEyes(w, h, 0.035);
}

function drawDragonfly(w, h, wobble, color) {
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.5;
  const flap = wobble ? 0.3 : -0.3;
  ctx.beginPath();
  ctx.ellipse(-w*0.3, -h*0.1 + flap*h*0.1, w*0.34, h*0.12, -0.15, 0, Math.PI*2);
  ctx.ellipse(w*0.3, -h*0.1 + flap*h*0.1, w*0.34, h*0.12, 0.15, 0, Math.PI*2);
  ctx.ellipse(-w*0.26, h*0.12 - flap*h*0.1, w*0.3, h*0.1, -0.1, 0, Math.PI*2);
  ctx.ellipse(w*0.26, h*0.12 - flap*h*0.1, w*0.3, h*0.1, 0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.ellipse(0, h*0.1, w*0.07, h*0.46, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, -h*0.4, w*0.16, h*0.16, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#00e5ff';
  ctx.beginPath();
  ctx.ellipse(-w*0.08, -h*0.4, w*0.08, h*0.09, 0, 0, Math.PI*2);
  ctx.ellipse(w*0.08, -h*0.4, w*0.08, h*0.09, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawCricket(w, h, wobble, color) {
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, w*0.035);
  const kick = wobble ? 1 : -1;
  ctx.beginPath();
  ctx.moveTo(-w*0.08, h*0.18);
  ctx.lineTo(-w*0.42, h*0.06);
  ctx.lineTo(-w*0.5, h*0.32 + kick*h*0.06);
  ctx.moveTo(w*0.08, h*0.18);
  ctx.lineTo(w*0.42, h*0.06);
  ctx.lineTo(w*0.5, h*0.32 - kick*h*0.06);
  ctx.stroke();
  drawLegs(w, h, 2, 0.15, wobble);
  ctx.beginPath();
  ctx.ellipse(0, h*0.05, w*0.26, h*0.32, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, -h*0.3, w*0.16, h*0.16, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-w*0.06, -h*0.4);
  ctx.quadraticCurveTo(-w*0.25, -h*0.5, -w*0.15, -h*0.62);
  ctx.moveTo(w*0.06, -h*0.4);
  ctx.quadraticCurveTo(w*0.25, -h*0.5, w*0.15, -h*0.62);
  ctx.stroke();

// Bosses mayores de insectos (niveles 4, 8, 12, 16 - uno distinto por aparición)
function drawMantisQueen(w, h, wobble, color) {
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, w*0.03);
  drawLegs(w, h, 2, 0.28, wobble);

  ctx.beginPath();
  ctx.ellipse(0, h*0.22, w*0.22, h*0.32, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(0, -h*0.05, w*0.13, h*0.26, 0, 0, Math.PI*2);
  ctx.fill();

  const armAngle = wobble ? 0.35 : 0.55;
  [-1, 1].forEach(side => {
    ctx.save();
    ctx.translate(side*w*0.14, -h*0.18);
    ctx.rotate(side * armAngle);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(side*w*0.32, -h*0.05);
    ctx.lineTo(side*w*0.26, h*0.14);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  });

  ctx.beginPath();
  ctx.moveTo(0, -h*0.5);
  ctx.lineTo(-w*0.14, -h*0.3);
  ctx.lineTo(w*0.14, -h*0.3);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(-w*0.08, -h*0.4, w*0.05, h*0.06, 0, 0, Math.PI*2);
  ctx.ellipse(w*0.08, -h*0.4, w*0.05, h*0.06, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawSkull(w, h, wobble, color) {
  ctx.fillStyle = color;

function drawWitch(w, h, wobble, color) {
  ctx.fillStyle = color;

  ctx.moveTo(-w*0.34, h*0.45);
  ctx.quadraticCurveTo(-w*0.4, h*0.05, 0, -h*0.05);
  ctx.quadraticCurveTo(w*0.4, h*0.05, w*0.34, h*0.45);
  ctx.closePath();

  ctx.beginPath();
  ctx.ellipse(0, -h*0.2, w*0.18, h*0.18, 0, 0, Math.PI*2);
  ctx.fill();

  const tilt = wobble ? 0.06 : -0.06;
  ctx.save();
  ctx.translate(0, -h*0.32);
  ctx.rotate(tilt);
  ctx.beginPath();
  ctx.moveTo(-w*0.22, 0);
  ctx.lineTo(w*0.22, 0);
  ctx.lineTo(0, -h*0.5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  ctx.beginPath();
  ctx.ellipse(0, -h*0.32, w*0.3, h*0.05, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = '#7CFC00';
  ctx.beginPath();
  ctx.ellipse(-w*0.06, -h*0.2, w*0.035, h*0.04, 0, 0, Math.PI*2);
  ctx.ellipse(w*0.06, -h*0.2, w*0.035, h*0.04, 0, 0, Math.PI*2);

}

// Boss final (nivel 20, ambas historias): rata furiosa
function drawRat(w, h, wobble, color) {
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, w*0.035);

  // cola, se agita
  ctx.beginPath();
  ctx.moveTo(w*0.34, h*0.15);
  ctx.quadraticCurveTo(w*0.62, h*0.05 + (wobble ? -h*0.1 : h*0.1), w*0.7, h*0.42);
  ctx.stroke();

  drawLegs(w, h, 2, 0.3, wobble);

  // cuerpo
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, h*0.1, w*0.36, h*0.32, 0, 0, Math.PI*2);
  ctx.fill();

  // orejas
  ctx.beginPath();
  ctx.ellipse(-w*0.22, -h*0.36, w*0.11, h*0.13, 0, 0, Math.PI*2);
  ctx.ellipse(w*0.22, -h*0.36, w*0.11, h*0.13, 0, 0, Math.PI*2);
  ctx.fill();

  // cabeza
  ctx.beginPath();
  ctx.ellipse(0, -h*0.2, w*0.24, h*0.22, 0, 0, Math.PI*2);
  ctx.fill();

  // hocico
  ctx.beginPath();
  ctx.moveTo(-w*0.11, -h*0.08);
  ctx.lineTo(w*0.11, -h*0.08);
  ctx.lineTo(0, h*0.03);
  ctx.closePath();
  ctx.fill();

  // dientes furiosos
  ctx.fillStyle = '#fff';
  ctx.fillRect(-w*0.07, -h*0.05, w*0.055, h*0.1);
  ctx.fillRect(w*0.015, -h*0.05, w*0.055, h*0.1);

  // cejas fruncidas
  ctx.strokeStyle = '#000';
  ctx.lineWidth = Math.max(1, w*0.025);
  ctx.beginPath();
  ctx.moveTo(-w*0.17, -h*0.34); ctx.lineTo(-w*0.05, -h*0.28);
  ctx.moveTo(w*0.17, -h*0.34); ctx.lineTo(w*0.05, -h*0.28);
  ctx.stroke();

  // ojos furiosos
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.ellipse(-w*0.1, -h*0.24, w*0.045, h*0.05, 0, 0, Math.PI*2);
  ctx.ellipse(w*0.1, -h*0.24, w*0.045, h*0.05, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawAlien(a) {
  const wobble = Math.sin(a.anim) > 0;
  const isMonster = enemyTheme === 'monsters';
  const colors = isMonster ? monsterColors : alienColors;
  const drawers = isMonster ? monsterDrawers : insectDrawers;
  const color = a.frozen ? '#3ec6ff' : colors[a.row % colors.length];
  const x = a.x, y = a.y, w = a.w, h = a.h;
  const cx = x + w/2, cy = y + h/2;
  const drawer = drawers[a.row % drawers.length];

  ctx.save();
  ctx.translate(cx, cy);
  drawer(w, h, wobble, color);
  if (a.burning) drawBurnOverlay(w, h, a);
  ctx.restore();
}

// Mientras arden, parpadean en rojo en vez de mostrar su color normal
function drawBurnOverlay(w, h, a) {
  const blinkOn = Math.sin(a.anim * 6) > 0;
  if (!blinkOn) return;
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = '#ff2222';
  ctx.beginPath();
  ctx.ellipse(0, 0, w*0.5, h*0.55, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  const color = boss.slowTimer > 0 ? '#3ec6ff' : boss.baseColor;
  const cx = boss.x + boss.w/2, cy = boss.y + boss.h/2;
  const wobble = Math.sin(boss.anim) > 0;

  ctx.save();
  ctx.translate(cx, cy);
  boss.drawer(boss.w, boss.h, wobble, color);
  ctx.restore();

  // barra de vida
  const barX = boss.x, barY = boss.y - 14, barW = boss.w;
  ctx.fillStyle = '#400';
  ctx.fillRect(barX, barY, barW, 8);
  ctx.fillStyle = '#ff2222';
  ctx.fillRect(barX, barY, barW * (boss.hp / boss.maxHp), 8);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, 8);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
